<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TODOリスト">
<meta name="theme-color" content="#2D2D2D">
<title>TODOリスト</title>
<link rel="apple-touch-icon" href="todo_icon.gif">
<link rel="icon" type="image/gif" href="todo_icon.gif">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent;font-family:'Noto Sans JP',sans-serif}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);background:linear-gradient(160deg,#F6F4F1,#ECEAE6);min-height:100vh}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
input:focus{border-color:#999!important}
[draggable]{-webkit-user-drag:element}
.main{max-width:620px;margin:0 auto;padding:28px 16px 60px}
.btn-reset{background:none;border:none;cursor:pointer;padding:0}
/* Category */
.cat-card{border-radius:14px;overflow:hidden;border:1px solid #EBEBEB;background:#fff;animation:slideUp .35s ease;margin-bottom:16px;transition:border .15s,background .15s,opacity .15s,box-shadow .15s}
.cat-card.dragging{border:1.5px solid #6C63FF;background:#F0EDFF;opacity:.85;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.cat-card.drop-target{border:1.5px dashed #2EC4B6;background:#E8F8F0}
.cat-header{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.cat-header:hover{background:#FAFAFA}
.cat-name{font-weight:700;font-size:15px;color:#2D2D2D;flex:1;cursor:text}
.cat-name-input{flex:1;font-weight:700;font-size:15px;color:#2D2D2D;border:none;outline:none;background:transparent;padding:2px 0}
.cat-count{font-size:12px;color:#AAA}
.cat-progress{width:48px;height:4px;border-radius:2px;background:#EBEBEB;overflow:hidden}
.cat-progress-bar{height:100%;border-radius:2px;transition:width .4s ease}
/* Task */
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;background:#fff;border:1px solid #EBEBEB;transition:background .15s,border .15s,opacity .15s;animation:slideUp .3s ease}
.task-item.done{background:#F8F8F8;opacity:.6}
.task-item.dragging{background:#F0EDFF;border:1.5px solid #6C63FF;opacity:.85;box-shadow:0 4px 16px rgba(0,0,0,.1)}
.task-item.drop-target{background:#E8F8F0;border:1.5px dashed #2EC4B6}
.task-check{width:22px;height:22px;min-width:22px;border-radius:6px;border:2px solid #CCC;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease;margin-top:1px}
.task-check.checked{border:none}
.task-text{font-size:14.5px;font-weight:500;color:#2D2D2D;word-break:break-word}
.task-text.done{text-decoration:line-through;color:#999}
.task-meta{margin-top:4px;display:flex;align-items:center;gap:8px;font-size:11px}
.task-attach{color:#AAA;cursor:pointer;display:inline-flex;align-items:center;gap:3px;transition:color .15s}
.task-attach:hover{color:#4EA8DE}
.task-deadline{display:inline-flex;align-items:center;gap:3px;font-weight:600}
.icon-btn{background:none;border:none;color:#CCC;cursor:pointer;padding:4px;border-radius:6px;transition:color .15s;flex-shrink:0}
.icon-btn.edit:hover{color:#F4A627}
.icon-btn.delete:hover{color:#E84855}
.icon-btn.rename:hover{color:#888}
.grip{cursor:grab;color:#CCC;display:flex;align-items:center;padding:2px 0;touch-action:none;flex-shrink:0}
/* Forms */
.add-form{display:flex;flex-direction:column;gap:10px;padding:14px;border-radius:10px;background:#FAFAFA;border:1px dashed #DDD}
.add-row{display:flex;gap:8px;align-items:center}
.add-input{flex:1;padding:9px 12px;border-radius:8px;border:1px solid #DDD;font-size:14px;font-family:inherit;outline:none;background:#fff}
.add-btn{background:#2D2D2D;color:#fff;border:none;border-radius:8px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;transition:background .15s}
.add-btn:hover{background:#444}
.file-btn,.date-area{background:none;border:1px solid #DDD;border-radius:8px;padding:4px 10px;cursor:pointer;color:#888;display:flex;align-items:center;gap:4px;font-size:12px;font-family:inherit;transition:all .15s}
.file-btn:hover{border-color:#999;color:#555}
.file-badge{display:flex;align-items:center;gap:4px;padding:2px 8px;background:#F5F5F5;border-radius:6px;font-size:11px;color:#555}
.date-input{padding:4px 8px;border-radius:8px;border:1px solid #DDD;font-size:12px;font-family:inherit;outline:none;background:#fff}
/* Edit form */
.edit-form{padding:14px 16px;border-radius:10px;background:#FFFEF5;border:1.5px solid #F4A627;animation:slideUp .2s ease;display:flex;flex-direction:column;gap:10px}
.edit-input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid #DDD;font-size:14px;font-family:inherit;outline:none;background:#fff}
.edit-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.save-btn{background:#2D2D2D;color:#fff;border:none;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.cancel-btn{background:none;border:1px solid #DDD;border-radius:8px;padding:6px 14px;cursor:pointer;color:#888;font-size:12px;font-family:inherit}
/* New category */
.new-cat-btn{display:flex;align-items:center;gap:6px;background:#fff;border:1px dashed #CCC;border-radius:10px;padding:10px 18px;cursor:pointer;width:100%;justify-content:center;color:#888;font-size:13px;font-family:inherit;font-weight:600;transition:all .2s}
.new-cat-btn:hover{border-color:#999;color:#555}
.new-cat-form{background:#fff;border-radius:12px;padding:16px;border:1px solid #EBEBEB;animation:slideDown .25s ease;display:flex;flex-direction:column;gap:10px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;transition:border .15s;padding:0;border:2px solid transparent}
.color-dot.sel{border:2.5px solid #2D2D2D}
/* Data buttons */
.data-bar{margin-top:28px;display:flex;gap:10px;justify-content:center}
.data-btn{background:none;border:1px solid #CCC;border-radius:8px;padding:8px 18px;cursor:pointer;color:#888;font-size:12px;font-family:inherit;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s}
.data-btn:hover{border-color:#999;color:#555}
/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;cursor:zoom-out}
.modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .15s;z-index:10000}
.modal-close:hover{background:rgba(255,255,255,.3)}
.modal-img{max-width:90vw;max-height:88vh;border-radius:12px;object-fit:contain;cursor:default;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.modal-pdf{width:90vw;height:88vh;border-radius:12px;border:none;box-shadow:0 8px 40px rgba(0,0,0,.4);background:#fff}
.empty{text-align:center;padding:18px;color:#CCC;font-size:13px}
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#AAA;font-size:14px}
</style>
<script>
// Manifest
(function(){
  const icon = document.querySelector('link[rel="apple-touch-icon"]').href;
  const m = {name:"TODOリスト",short_name:"TODOリスト",start_url:"./todo-pwa.html",display:"standalone",background_color:"#F6F4F1",theme_color:"#2D2D2D",orientation:"portrait",icons:[{src:icon,sizes:"512x512",type:"image/gif",purpose:"any maskable"}]};
  const b = new Blob([JSON.stringify(m)],{type:'application/json'});
  document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(b);
  if('serviceWorker' in navigator){
    const sw=`const C='todo-v2';self.addEventListener('install',e=>{self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{if(resp.status===200){const c=resp.clone();caches.open(C).then(ca=>ca.put(e.request,c))}return resp}).catch(()=>caches.match(e.request))))});`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
  }
})();
</script>
</head>
<body>
<div id="root" class="loading">読み込み中...</div>
<script>
"use strict";

// ─── SVG Icons as strings ───
const ICO = {
  check: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  trash: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  plus: s => `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  clip: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>',
  pencil: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>',
  grip: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="6" r="1.2"/><circle cx="15" cy="6" r="1.2"/><circle cx="9" cy="12" r="1.2"/><circle cx="15" cy="12" r="1.2"/><circle cx="9" cy="18" r="1.2"/><circle cx="15" cy="18" r="1.2"/></svg>',
  chevron: o => `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="transition:transform .25s;transform:rotate(${o?90:0}deg)"><polyline points="9 6 15 12 9 18"/></svg>`,
  folder: c => `<svg width="18" height="18" viewBox="0 0 24 24" fill="${c}" stroke="${c}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
  close: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  download: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  upload: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
  cal: c => `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  img: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>',
};

const COLORS = ["#E84855","#F4A627","#4EA8DE","#6C63FF","#2EC4B6","#E07A5F","#81B29A","#F2CC8F"];
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function h(tag,attrs,...ch){const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='class')el.className=v;else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='html')el.innerHTML=v;else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);else el.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null){if(typeof c==='string')el.appendChild(document.createTextNode(c));else el.appendChild(c)}});return el}

// ─── File helpers ───
function isImg(t){return t&&t.startsWith('image/')}
function isPdf(t){return t==='application/pdf'}
function isPreview(t){return isImg(t)||isPdf(t)}
function fileIcon(t){if(isImg(t))return'🖼';if(isPdf(t))return'📄';if(t&&(t.includes('spreadsheet')||t==='text/csv'))return'📊';if(t&&(t.includes('word')||t==='text/plain'))return'📝';return'📎'}
function dlFile(a){const l=h('a',{href:a.data,download:a.name||'file'});document.body.appendChild(l);l.click();l.remove()}

// ─── IndexedDB ───
const DB='TodoAppDB';
function openDB(){return new Promise((ok,ng)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('state'))d.createObjectStore('state')};r.onsuccess=()=>ok(r.result);r.onerror=()=>ng(r.error)})}
async function dbGet(k){const d=await openDB();return new Promise((ok,ng)=>{const t=d.transaction('state','readonly');const r=t.objectStore('state').get(k);r.onsuccess=()=>ok(r.result);r.onerror=()=>ng(r.error)})}
async function dbSet(k,v){const d=await openDB();return new Promise((ok,ng)=>{const t=d.transaction('state','readwrite');t.objectStore('state').put(v,k);t.oncomplete=()=>ok();t.onerror=()=>ng(t.error)})}

// ─── State ───
let state = {
  categories:[{id:'cat-1',name:'仕事',color:'#6C63FF'},{id:'cat-2',name:'プライベート',color:'#2EC4B6'}],
  tasks:[],
  catOpen:{},
};
let dragState = {type:null,id:null,targetId:null};

async function loadState(){
  try{const c=await dbGet('categories');if(c)state.categories=c}catch{}
  try{const t=await dbGet('tasks');if(t)state.tasks=t}catch{}
}
function saveCategories(){dbSet('categories',state.categories).catch(()=>{})}
function saveTasks(){dbSet('tasks',state.tasks).catch(()=>{})}

// ─── Modal ───
function showModal(att){
  const ov=h('div',{class:'modal-overlay',onClick:()=>ov.remove()});
  const cl=h('button',{class:'modal-close',html:ICO.close,onClick:e=>{e.stopPropagation();ov.remove()}});
  ov.appendChild(cl);
  const wrap=h('div',{style:{cursor:'default',maxWidth:'92vw',maxHeight:'90vh'},onClick:e=>e.stopPropagation()});
  if(isImg(att.type))wrap.appendChild(h('img',{src:att.data,class:'modal-img'}));
  else if(isPdf(att.type)){const ifr=h('iframe',{src:att.data,class:'modal-pdf'});wrap.appendChild(ifr)}
  ov.appendChild(wrap);document.body.appendChild(ov);
}

// ─── Render ───
function render(){
  const root=document.getElementById('root');
  root.className='main';
  root.innerHTML='';
  root.appendChild(renderCatForm());
  root.appendChild(renderCategories());
  root.appendChild(renderDataBar());
}

function renderCatForm(){
  const wrap=h('div',{style:{marginBottom:'20px'}});
  const btn=h('button',{class:'new-cat-btn',onClick:()=>{btn.replaceWith(renderCatFormExpanded())}});
  btn.innerHTML=ICO.plus(16)+' 新しい分類を作成';
  wrap.appendChild(btn);return wrap;
}

function renderCatFormExpanded(){
  let name='',color=COLORS[0];
  const inp=h('input',{placeholder:'分類名を入力...',class:'add-input',onKeydown:e=>{if(e.key==='Enter')add()},onInput:e=>{name=e.target.value}});
  const addBtn=h('button',{class:'add-btn',html:ICO.plus(18),onClick:add});
  const cancelBtn=h('button',{class:'cancel-btn',onClick:()=>render()});cancelBtn.textContent='取消';
  const dots=h('div',{style:{display:'flex',gap:'6px',alignItems:'center'}});
  dots.appendChild(h('span',{style:{fontSize:'12px',color:'#888'}},'色:'));
  COLORS.forEach(c=>{const d=h('button',{class:'color-dot'+(color===c?' sel':''),style:{background:c},onClick:()=>{color=c;dots.querySelectorAll('.color-dot').forEach(x=>x.classList.toggle('sel',x.style.background===c))}});dots.appendChild(d)});
  function add(){if(!name.trim())return;state.categories.push({id:gid(),name:name.trim(),color});saveCategories();render()}
  const form=h('div',{class:'new-cat-form'},h('div',{class:'add-row'},inp,addBtn,cancelBtn),dots);
  inp.focus();return form;
}

function renderCategories(){
  const wrap=h('div',{style:{display:'flex',flexDirection:'column',gap:'0px'}});
  if(!state.categories.length){wrap.appendChild(h('div',{class:'empty',style:{padding:'48px'}},'分類を作成してタスク管理を始めましょう'));return wrap}
  state.categories.forEach((cat,ci)=>{
    const card=h('div',{class:'cat-card','data-catid':cat.id});
    let catDragging=false;
    let catDragCount=0;
    card.setAttribute('draggable','false');
    card.addEventListener('dragstart',e=>{if(!catDragging){e.preventDefault();return}dragState={type:'cat',id:cat.id};e.dataTransfer.effectAllowed='move'});
    card.addEventListener('dragover',e=>{e.preventDefault();if(dragState.type==='cat'&&dragState.id!==cat.id){card.classList.add('drop-target');dragState.targetId=cat.id}});
    card.addEventListener('dragenter',e=>{catDragCount++;if(dragState.type==='cat'&&dragState.id!==cat.id)card.classList.add('drop-target')});
    card.addEventListener('dragleave',e=>{catDragCount--;if(catDragCount<=0){catDragCount=0;card.classList.remove('drop-target')}});
    card.addEventListener('drop',e=>{e.preventDefault();catDragCount=0;card.classList.remove('drop-target');if(dragState.type==='cat'&&dragState.id!==cat.id)reorderCats(dragState.id,cat.id)});
    card.addEventListener('dragend',()=>{catDragging=false;card.setAttribute('draggable','false');dragState={type:null,id:null,targetId:null};document.querySelectorAll('.drop-target').forEach(x=>x.classList.remove('drop-target'))});

    const open=state.catOpen[cat.id]!==false;
    const tasks=state.tasks.filter(t=>t.categoryId===cat.id);
    const done=tasks.filter(t=>t.done).length;
    card.appendChild(renderCatHeader(cat,tasks.length,done,open,card,()=>{catDragging=true;card.setAttribute('draggable','true')}));
    if(open)card.appendChild(renderCatBody(cat,tasks));
    wrap.appendChild(card);
  });
  return wrap;
}

function renderCatHeader(cat,total,done,open,card,onGripDown){
  let editing=false;
  const hdr=h('div',{class:'cat-header'});
  // Grip
  const grip=h('div',{class:'grip',html:ICO.grip,onClick:e=>e.stopPropagation()});
  grip.addEventListener('mousedown',()=>{if(onGripDown)onGripDown()});
  grip.addEventListener('touchstart',e=>touchStart('cat',cat.id,null,e),{passive:false});
  // Chevron
  const chev=h('span',{html:ICO.chevron(open)});
  // Folder
  const folder=h('span',{html:ICO.folder(cat.color)});
  // Name
  const nameEl=h('span',{class:'cat-name'},cat.name);
  nameEl.addEventListener('dblclick',e=>{e.stopPropagation();startRename()});
  // Rename btn
  const renBtn=h('button',{class:'icon-btn rename',html:ICO.pencil,title:'名称変更',onClick:e=>{e.stopPropagation();startRename()}});
  // Count
  const cnt=h('span',{class:'cat-count'},`${done}/${total}`);
  // Progress
  const prog=h('div',{class:'cat-progress'});
  const bar=h('div',{class:'cat-progress-bar',style:{width:total?`${(done/total)*100}%`:'0',background:cat.color}});
  prog.appendChild(bar);
  // Delete
  const del=h('button',{class:'icon-btn delete',html:ICO.trash,title:'分類を削除',onClick:e=>{e.stopPropagation();state.categories=state.categories.filter(c=>c.id!==cat.id);state.tasks=state.tasks.filter(t=>t.categoryId!==cat.id);saveCategories();saveTasks();render()}});

  function startRename(){
    if(editing)return;editing=true;
    const inp=h('input',{class:'cat-name-input',value:cat.name,style:{borderBottom:`2px solid ${cat.color}`}});
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')commit();if(e.key==='Escape'){editing=false;render()}});
    inp.addEventListener('blur',()=>setTimeout(commit,100));
    nameEl.replaceWith(inp);renBtn.style.display='none';
    inp.focus();inp.select();
    function commit(){const v=inp.value.trim();if(v){cat.name=v;saveCategories()}editing=false;render()}
  }

  hdr.addEventListener('click',()=>{if(!editing){state.catOpen[cat.id]=!open;render()}});
  [grip,chev,folder,nameEl,renBtn,cnt,prog,del].forEach(x=>hdr.appendChild(x));
  return hdr;
}

function renderCatBody(cat,tasks){
  const body=h('div',{style:{padding:'12px 16px',display:'flex',flexDirection:'column',gap:'8px'}});
  if(!tasks.length)body.appendChild(h('div',{class:'empty'},'タスクがありません'));
  tasks.forEach(t=>body.appendChild(renderTask(t,cat.color)));
  body.appendChild(renderAddForm(cat.id));
  return body;
}

function renderTask(task,accent){
  // Check if editing
  if(task._editing)return renderEditForm(task,accent);

  const item=h('div',{class:'task-item'+(task.done?' done':''),'data-taskid':task.id});
  item.setAttribute('draggable','false');
  let taskDragging=false;
  let dragOverCount=0;
  item.addEventListener('dragstart',e=>{if(!taskDragging){e.preventDefault();return}e.stopPropagation();dragState={type:'task',id:task.id,catId:task.categoryId};e.dataTransfer.effectAllowed='move'});
  item.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();if(dragState.type==='task'&&dragState.id!==task.id){item.classList.add('drop-target');dragState.targetId=task.id}});
  item.addEventListener('dragenter',e=>{e.stopPropagation();dragOverCount++;if(dragState.type==='task'&&dragState.id!==task.id)item.classList.add('drop-target')});
  item.addEventListener('dragleave',e=>{e.stopPropagation();dragOverCount--;if(dragOverCount<=0){dragOverCount=0;item.classList.remove('drop-target')}});
  item.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();dragOverCount=0;item.classList.remove('drop-target');if(dragState.type==='task'&&dragState.id!==task.id)reorderTasks(task.categoryId,dragState.id,task.id)});
  item.addEventListener('dragend',e=>{e.stopPropagation();taskDragging=false;item.setAttribute('draggable','false');dragState={type:null,id:null,targetId:null};document.querySelectorAll('.drop-target').forEach(x=>x.classList.remove('drop-target'))});

  // Grip
  const grip=h('div',{class:'grip',html:ICO.grip});
  grip.addEventListener('mousedown',()=>{taskDragging=true;item.setAttribute('draggable','true')});
  grip.addEventListener('touchstart',e=>touchStart('task',task.id,task.categoryId,e),{passive:false});
  // Check
  const chk=h('button',{class:'task-check'+(task.done?' checked':''),style:task.done?{background:accent,border:'none'}:{},html:task.done?ICO.check:'',onClick:()=>{task.done=!task.done;saveTasks();render()}});
  // Content
  const content=h('div',{style:{flex:'1',minWidth:'0',cursor:'default'}});
  content.addEventListener('dblclick',e=>{e.stopPropagation();task._editing=true;render()});
  content.setAttribute('title','ダブルクリックで編集');
  const txt=h('span',{class:'task-text'+(task.done?' done':'')},task.text);
  content.appendChild(txt);
  // Meta row
  if(task.attachment||task.deadline){
    const meta=h('div',{class:'task-meta'});
    if(task.attachment){
      const att=h('span',{class:'task-attach',title:isPreview(task.attachment.type)?'タップで閲覧':'タップでダウンロード'});
      att.innerHTML=`<span style="font-size:13px">${fileIcon(task.attachment.type)}</span><span style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${task.attachment.name}</span>`;
      att.addEventListener('click',e=>{e.stopPropagation();if(isPreview(task.attachment.type))showModal(task.attachment);else dlFile(task.attachment)});
      meta.appendChild(att);
    }
    if(task.deadline){
      const today=new Date();today.setHours(0,0,0,0);
      const dl=new Date(task.deadline+'T00:00:00');
      const diff=Math.ceil((dl-today)/86400000);
      const over=diff<0,soon=diff>=0&&diff<=3;
      const clr=over?'#E84855':soon?'#F4A627':'#999';
      const p=task.deadline.split('-');
      const label=`${parseInt(p[1])}/${parseInt(p[2])}${over?' 期限切れ':soon?` あと${diff}日`:''}`;
      const span=h('span',{class:'task-deadline',style:{color:clr}});
      span.innerHTML=ICO.cal(clr)+`<span>${label}</span>`;
      meta.appendChild(span);
    }
    content.appendChild(meta);
  }
  // Edit btn
  const editBtn=h('button',{class:'icon-btn edit',html:ICO.pencil,title:'編集',onClick:e=>{e.stopPropagation();task._editing=true;render()}});
  // Delete btn
  const delBtn=h('button',{class:'icon-btn delete',html:ICO.trash,title:'削除',onClick:()=>{state.tasks=state.tasks.filter(t=>t.id!==task.id);saveTasks();render()}});

  [grip,chk,content,editBtn,delBtn].forEach(x=>item.appendChild(x));
  return item;
}

function renderEditForm(task){
  let txt=task.text,dl=task.deadline||'',att=task.attachment;
  const form=h('div',{class:'edit-form'});
  const inp=h('input',{class:'edit-input',value:txt,onInput:e=>{txt=e.target.value},onKeydown:e=>{if(e.key==='Enter')save();if(e.key==='Escape')cancel()}});
  const row=h('div',{class:'edit-row'});
  // Date
  const dateWrap=h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}});
  dateWrap.innerHTML=ICO.cal('#AAA');
  const dateInp=h('input',{type:'date',class:'date-input',value:dl,onInput:e=>{dl=e.target.value}});
  dateWrap.appendChild(dateInp);
  if(dl){const x=h('button',{class:'btn-reset',style:{color:'#CCC',fontSize:'14px'},onClick:()=>{dl='';dateInp.value=''}});x.textContent='×';dateWrap.appendChild(x)}
  // File
  const fileInp=h('input',{type:'file',style:{display:'none'},onChange:e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{att={data:ev.target.result,name:f.name,type:f.type};render2()};r.readAsDataURL(f)}});
  const fileBtn=h('button',{class:'file-btn',onClick:()=>fileInp.click()});fileBtn.innerHTML=ICO.clip+' ファイル';
  // Att badge
  function attBadge(){if(!att)return null;const b=h('div',{class:'file-badge'});b.innerHTML=`<span>${fileIcon(att.type)}</span><span style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${att.name}</span>`;const x=h('button',{class:'btn-reset',style:{color:'#CCC',fontSize:'14px',marginLeft:'2px'},onClick:()=>{att=null;render2()}});x.textContent='×';b.appendChild(x);return b}
  // Buttons
  const btns=h('div',{style:{marginLeft:'auto',display:'flex',gap:'8px'}});
  const cancelB=h('button',{class:'cancel-btn',onClick:cancel});cancelB.textContent='取消';
  const saveB=h('button',{class:'save-btn',onClick:save});saveB.textContent='保存';
  btns.append(cancelB,saveB);

  function render2(){row.innerHTML='';row.append(dateWrap,fileInp,fileBtn);const ab=attBadge();if(ab)row.appendChild(ab);row.appendChild(btns)}
  function save(){if(!txt.trim())return;task.text=txt.trim();task.deadline=dl||null;task.attachment=att;delete task._editing;saveTasks();render()}
  function cancel(){delete task._editing;render()}

  render2();
  form.append(inp,row);
  setTimeout(()=>inp.focus(),30);
  return form;
}

function renderAddForm(catId){
  let txt='',dl='',att=null;
  const form=h('div',{class:'add-form'});
  const inp=h('input',{class:'add-input',placeholder:'新しいタスクを入力...',onInput:e=>{txt=e.target.value},onKeydown:e=>{if(e.key==='Enter')add()}});
  const addBtn=h('button',{class:'add-btn',html:ICO.plus(18),onClick:add});
  const row2=h('div',{class:'add-row',style:{flexWrap:'wrap'}});
  // File
  const fileInp=h('input',{type:'file',style:{display:'none'},onChange:e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{att={data:ev.target.result,name:f.name,type:f.type};updateRow2()};r.readAsDataURL(f)}});
  const fileBtn=h('button',{class:'file-btn',onClick:()=>fileInp.click()});fileBtn.innerHTML=ICO.clip+' ファイルを添付';
  // Date
  const dateWrap=h('div',{style:{display:'flex',alignItems:'center',gap:'4px'}});
  dateWrap.innerHTML=ICO.cal('#AAA');
  const dateInp=h('input',{type:'date',class:'date-input',onInput:e=>{dl=e.target.value}});
  dateWrap.appendChild(dateInp);

  function updateRow2(){
    row2.innerHTML='';row2.append(fileInp,fileBtn,dateWrap);
    if(att){const b=h('div',{class:'file-badge'});b.innerHTML=`<span>${fileIcon(att.type)}</span><span style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${att.name}</span>`;const x=h('button',{class:'btn-reset',style:{color:'#CCC',fontSize:'14px',marginLeft:'2px'},onClick:()=>{att=null;fileInp.value='';updateRow2()}});x.textContent='×';b.appendChild(x);row2.appendChild(b)}
  }
  function add(){if(!txt.trim())return;state.tasks.push({id:gid(),categoryId:catId,text:txt.trim(),attachment:att,deadline:dl||null,done:false});saveTasks();render()}

  updateRow2();
  form.append(h('div',{class:'add-row'},inp,addBtn),row2);
  return form;
}

function renderDataBar(){
  const bar=h('div',{class:'data-bar'});
  const expBtn=h('button',{class:'data-btn',onClick:exportData});expBtn.innerHTML=ICO.download+' データ保存';
  const impInp=h('input',{type:'file',accept:'.json',style:{display:'none'},onChange:importData});
  const impBtn=h('button',{class:'data-btn',onClick:()=>impInp.click()});impBtn.innerHTML=ICO.upload+' データ読込';
  bar.append(expBtn,impInp,impBtn);return bar;
}

function exportData(){
  const d=JSON.stringify({categories:state.categories,tasks:state.tasks},null,2);
  const b=new Blob([d],{type:'application/json'});
  const now=new Date();
  const ts=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const a=h('a',{href:URL.createObjectURL(b),download:`todo_backup_${ts}.json`});
  document.body.appendChild(a);a.click();a.remove();
}

function importData(e){
  const f=e.target.files?.[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.categories&&Array.isArray(d.categories))state.categories=d.categories;
      if(d.tasks&&Array.isArray(d.tasks))state.tasks=d.tasks;
      saveCategories();saveTasks();render();
    }catch{alert('ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。')}
  };
  r.readAsText(f);e.target.value='';
}

// ─── Reorder ───
function reorderCats(fromId,toId){
  const arr=state.categories;const fi=arr.findIndex(c=>c.id===fromId);const ti=arr.findIndex(c=>c.id===toId);
  if(fi===-1||ti===-1)return;const [m]=arr.splice(fi,1);arr.splice(ti,0,m);saveCategories();render();
}
function reorderTasks(catId,fromId,toId){
  const catTasks=state.tasks.filter(t=>t.categoryId===catId);
  const others=state.tasks.filter(t=>t.categoryId!==catId);
  const fi=catTasks.findIndex(t=>t.id===fromId);const ti=catTasks.findIndex(t=>t.id===toId);
  if(fi===-1||ti===-1)return;const [m]=catTasks.splice(fi,1);catTasks.splice(ti,0,m);
  state.tasks=[...others,...catTasks];saveTasks();render();
}

// ─── Touch Drag System ───
let touchDrag = {active:false, type:null, id:null, catId:null, ghost:null, currentTarget:null};

function touchStart(type, id, catId, e) {
  const touch = e.touches[0];
  const grip = e.currentTarget;
  const el = type==='task' ? grip.closest('.task-item') : grip.closest('.cat-card');
  if(!el) return;

  // Create ghost element
  const rect = el.getBoundingClientRect();
  const ghost = el.cloneNode(true);
  ghost.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:9998;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.15);transform:scale(1.02);transition:none;`;
  document.body.appendChild(ghost);

  // Dim original
  el.style.opacity = '0.3';

  touchDrag = {
    active: true, type, id, catId: catId||null,
    ghost, sourceEl: el,
    startY: touch.clientY, offsetY: touch.clientY - rect.top,
    currentTarget: null
  };

  e.preventDefault();
}

document.addEventListener('touchmove', e => {
  if(!touchDrag.active) return;
  const touch = e.touches[0];
  const ghost = touchDrag.ghost;
  if(ghost) {
    ghost.style.top = (touch.clientY - touchDrag.offsetY) + 'px';
  }

  // Find drop target
  if(ghost) ghost.style.display = 'none';
  const elBelow = document.elementFromPoint(touch.clientX, touch.clientY);
  if(ghost) ghost.style.display = '';

  // Clear previous target
  if(touchDrag.currentTarget) {
    touchDrag.currentTarget.classList.remove('drop-target');
    touchDrag.currentTarget = null;
  }

  if(!elBelow) return;

  if(touchDrag.type === 'task') {
    const taskEl = elBelow.closest('.task-item');
    if(taskEl && taskEl.dataset.taskid && taskEl.dataset.taskid !== touchDrag.id) {
      taskEl.classList.add('drop-target');
      touchDrag.currentTarget = taskEl;
    }
  } else if(touchDrag.type === 'cat') {
    const catEl = elBelow.closest('.cat-card');
    if(catEl && catEl.dataset.catid && catEl.dataset.catid !== touchDrag.id) {
      catEl.classList.add('drop-target');
      touchDrag.currentTarget = catEl;
    }
  }

  e.preventDefault();
}, {passive:false});

document.addEventListener('touchend', e => {
  if(!touchDrag.active) return;

  // Perform drop
  if(touchDrag.currentTarget) {
    touchDrag.currentTarget.classList.remove('drop-target');
    if(touchDrag.type === 'task') {
      const targetId = touchDrag.currentTarget.dataset.taskid;
      if(targetId && targetId !== touchDrag.id) {
        reorderTasks(touchDrag.catId, touchDrag.id, targetId);
      }
    } else if(touchDrag.type === 'cat') {
      const targetId = touchDrag.currentTarget.dataset.catid;
      if(targetId && targetId !== touchDrag.id) {
        reorderCats(touchDrag.id, targetId);
      }
    }
  } else {
    // No drop target - restore
    if(touchDrag.sourceEl) touchDrag.sourceEl.style.opacity = '';
  }

  // Cleanup
  if(touchDrag.ghost) touchDrag.ghost.remove();
  document.querySelectorAll('.drop-target').forEach(x=>x.classList.remove('drop-target'));
  touchDrag = {active:false, type:null, id:null, catId:null, ghost:null, currentTarget:null};
});

document.addEventListener('touchcancel', () => {
  if(!touchDrag.active) return;
  if(touchDrag.sourceEl) touchDrag.sourceEl.style.opacity = '';
  if(touchDrag.ghost) touchDrag.ghost.remove();
  document.querySelectorAll('.drop-target').forEach(x=>x.classList.remove('drop-target'));
  touchDrag = {active:false, type:null, id:null, catId:null, ghost:null, currentTarget:null};
});

// ─── Init ───
loadState().then(()=>render());
</script>
